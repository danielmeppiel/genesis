<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 720 280" width="720"
     role="img"
     aria-label="Five different harness folder conventions are the same primitive: PERSONA SCOPING FILE. genesis-skill names the substrate once.">
  <title>Five harnesses, one substrate concept</title>
  <desc>A diagram showing five harness-specific persona file paths (Claude Code, Copilot, Cursor, OpenCode, Codex) merging into a single substrate concept named PERSONA SCOPING FILE. Tagline: Markdown that steers an LLM is code. Design it before you write it.</desc>

  <style>
    .bg     { fill: #0d1117; }
    .mono   { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    .body   { fill: #e6edf3; }
    .dim    { fill: #e6edf3; opacity: 0.55; }
    .faint  { stroke: #e6edf3; stroke-opacity: 0.32; fill: none; }
    .hair   { stroke: #e6edf3; stroke-opacity: 0.10; }
    .accent       { stroke: #58a6ff; fill: none; }
    .accent-fill  { fill: #58a6ff; }
  </style>

  <rect class="bg" width="720" height="280" rx="8"/>

  <!-- column headers -->
  <text class="mono dim" x="36"  y="44" font-size="11" letter-spacing="0.18em">FIVE HARNESSES</text>
  <text class="mono dim" x="394" y="44" font-size="11" letter-spacing="0.18em">ONE SUBSTRATE CONCEPT</text>

  <!-- header rule -->
  <line class="hair" x1="36" y1="54" x2="684" y2="54" stroke-width="1"/>

  <!-- left column: real harness persona-file paths, exact strings from README -->
  <g class="mono body" font-size="14">
    <text x="36" y="92">.claude/agents/*.md</text>
    <text x="36" y="120">.github/agents/*.agent.md</text>
    <text x="36" y="148">.cursor/rules/*.mdc</text>
    <text x="36" y="176">.opencode/agent/*.md</text>
    <text x="36" y="204">AGENTS.md</text>
  </g>

  <!-- horizontal stubs from text column to vertical merge bar -->
  <g class="faint" stroke-width="1">
    <line x1="290" y1="88"  x2="348" y2="88"/>
    <line x1="290" y1="116" x2="348" y2="116"/>
    <line x1="290" y1="144" x2="348" y2="144"/>
    <line x1="290" y1="172" x2="348" y2="172"/>
    <line x1="290" y1="200" x2="348" y2="200"/>
  </g>

  <!-- vertical merge bar (the funnel) -->
  <line class="faint" x1="348" y1="88" x2="348" y2="200" stroke-width="1"/>

  <!-- accent: single horizontal arrow leaving the merge bar at the centre row -->
  <line class="accent" x1="348" y1="144" x2="378" y2="144" stroke-width="1.75"/>
  <polygon class="accent-fill" points="378,138 390,144 378,150"/>

  <!-- substrate concept label (the answer) -->
  <text class="mono body" x="400" y="151" font-size="22" font-weight="700" letter-spacing="0.01em">PERSONA SCOPING FILE</text>
  <text class="mono dim"  x="400" y="174" font-size="12">one of six substrate concepts</text>

  <!-- footer rule -->
  <line class="hair" x1="36" y1="234" x2="684" y2="234" stroke-width="1"/>

  <!-- footer tagline (canonical line, split: setup dim, payoff bright) -->
  <text class="mono dim"  x="36"  y="258" font-size="12">Markdown that steers an LLM is code.</text>
  <text class="mono body" x="298" y="258" font-size="12" font-weight="600">Design it before you write it.</text>
</svg>
